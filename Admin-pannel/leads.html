<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leads — Admin Panel | VK Services Enterprise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>

<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          primary: '#F3F4F6',

        fontFamily: {

<style>

    background:
      radial-gradient(circle at 10% 0%, rgba(99,102,241,0.10), transparent 40%),
      radial-gradient(circle at 90% 10%, rgba(217,70,239,0.08), transparent 35%),
      #0A0E17;
    color:#E5E7EB;
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  ::-webkit-scrollbar{height:8px;width:8px;}
  ::-webkit-scrollbar-thumb{background:#2a2f3d;border-radius:99px;}
  .row-fade{animation:fadeIn .35s ease both;}
  .stat-card{cursor:pointer;transition:transform .15s ease, box-shadow .15s ease;}
  .stat-card:hover{transform:translateY(-2px);box-shadow:0 10px 28px -6px rgba(0,0,0,.5);}
  .stat-card.active{outline:2px solid rgba(255,255,255,.7); outline-offset:2px;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
  .toast{transition:transform .35s ease, opacity .35s ease;}
  .status-select{appearance:none;-webkit-appearance:none;background-repeat:no-repeat;background-position:right .6rem center;background-size:12px;padding-right:1.9rem;}
  .amt-tick.saved{animation:pop .4s ease;}
  @keyframes pop{0%{transform:scale(1);}45%{transform:scale(1.25);}100%{transform:scale(1);}}
  input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
</style>
</head>
<body>

<div class="min-h-screen">
  <div class=" mx-auto">

    <!-- Topbar -->
    <header class="sticky top-0 z-20 bg-[#0D1220]/90 backdrop-blur border-b border-white/5 px-4 sm:px-7 py-4 flex justify-between gap-4">
      <div class="flex flex-col gap-4 pt-1">
        <div>
          <h1 class="font-body font-bold text-lg sm:text-xl text-white">Admin Panel</h1>
          <p class="text-xs text-gray-400 mt-0.5">VK Services Enterprise</p>

        <!-- Tab switcher -->

          <a href="index.html"
            class="flex items-center gap-2 px-5 py-2 rounded-full text-sm font-semibold text-gray-400 hover:text-white hover:bg-white/5 transition-all">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16v4H4zM4 12h16M4 16h16M4 20h10"/>
            </svg>
            Enquiries
          </a>
          <button id="navActiveLeads" onclick="switchView('active')"
            class="flex items-center gap-2 px-5 py-2 rounded-full text-sm font-bold bg-purple-600 text-white shadow-md shadow-purple-900/40 transition-all">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            Leads
          </button>
          <button id="navArchivedLeads" onclick="switchView('archived')"
            class="flex items-center gap-2 px-5 py-2 rounded-full text-sm font-semibold text-gray-400 hover:text-white hover:bg-white/5 transition-all">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="21 8 21 21 3 21 3 8"></polyline>
              <rect x="1" y="3" width="22" height="5"></rect>
              <line x1="10" y1="12" x2="14" y2="12"></line>

        </div>

      <div class="flex flex-col items-end gap-3 pt-1">

    <main class="p-4 sm:p-7">

      <!-- Table card -->

        <!-- Card header / toolbar -->
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3.5 px-5 sm:px-6 py-5 border-b border-white/5">
          <div class="flex items-center gap-2.5">
            <h2 class="font-display font-bold text-[17px] text-white">All Leads</h2>
            <span id="resultsBadge" class="bg-purple-500/10 text-purple-300 text-xs font-semibold px-2.5 py-1 rounded-full border border-purple-500/20">12 results</span>
          </div>
          <div class="flex items-center gap-2.5 flex-wrap">
            <div class="relative">
              <svg class="w-4 h-4 text-purple-400/70 absolute left-3.5 top-1/2 -translate-y-1/2" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-3.5-3.5"/></svg>
              <input id="searchInput" type="text" placeholder="Search name, mobile, email..." class="w-full sm:w-64 bg-[#0A0E17] border border-purple-500/30 rounded-full pl-10 pr-4 py-2.5 text-sm text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-purple-500/30 focus:border-purple-400/50 transition-all">

              <option value="Negative">Negative</option>

        <!-- ===== Desktop table ===== -->
        <div class="hidden lg:block overflow-x-auto">
          <table class="w-full text-sm">
            <thead>

                <th class="px-5 py-4 font-bold text-sm uppercase tracking-wider text-white">Mobile No.</th>

                <th class="px-5 py-4 font-bold text-sm uppercase tracking-wider text-white">Status</th>

          </table>
          <div id="emptyStateDesktop" class="hidden py-16 text-center text-gray-500 text-sm">No leads match your search.</div>

        <!-- ===== Mobile / tablet cards ===== -->
        <div id="cardList" class="lg:hidden flex flex-col gap-3.5 p-4 sm:p-5"></div>
        <div id="emptyStateMobile" class="hidden lg:hidden py-16 text-center text-gray-500 text-sm">No leads match your search.</div>
      </div>

    </main>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast fixed bottom-6 left-1/2 -translate-x-1/2 translate-y-20 opacity-0 bg-[#161B29] border border-white/10 text-white text-sm font-semibold px-5 py-3 rounded-full shadow-2xl z-50 flex items-center gap-2">
  <svg class="w-4 h-4 text-purple-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 13l4 4L19 7"/></svg>
  <span id="toastText">Updated</span>
</div>

<script>
/* ============ DATA STATE ============ */
let leads = [];
let currentView = 'active'; // 'active' or 'archived'

function switchView(view) {
  if (currentView === view) return;
  currentView = view;
  
  const navActive = document.getElementById('navActiveLeads');
  const navArchived = document.getElementById('navArchivedLeads');
  const pageTitle = document.querySelector('h2.font-display');
  
  const activeClasses = "flex items-center gap-2 px-5 py-2 rounded-full text-sm font-bold bg-purple-600 text-white shadow-md shadow-purple-900/40 transition-all".split(" ");
  const inactiveClasses = "flex items-center gap-2 px-5 py-2 rounded-full text-sm font-semibold text-gray-400 hover:text-white hover:bg-white/5 transition-all".split(" ");
  
  if (view === 'active') {
    navActive.className = activeClasses.join(" ");
    navArchived.className = inactiveClasses.join(" ");
    if(pageTitle) pageTitle.textContent = "All Leads";
  } else {
    navArchived.className = activeClasses.join(" ");
    navActive.className = inactiveClasses.join(" ");
    if(pageTitle) pageTitle.textContent = "Archived Leads";
  }
  
  // reset filters
  activeSearch = "";
  activeService = "";
  activeStatus = "";
  activeCardFilter = "";
  document.getElementById('searchInput').value = "";
  document.getElementById('serviceFilter').value = "";
  document.getElementById('statusFilterTop').value = "";
  hidePill();
  
  fetchLeads();
}

async function fetchLeads() {
  const token = sessionStorage.getItem('adminToken');
  if (!token) {
    window.location.href = 'index.html';
    return;
  }
  
  try {
    const endpoint = currentView === 'archived' ? '/leads/archive' : '/leads/all';
    const res = await fetch(`${CONFIG.API_BASE_URL}${endpoint}`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();
    if (data.success) {
      leads = data.data.map(l => ({
        id: l.id,
        name: l.name,
        mobile: l.mobile,
        email: l.email,
        service: l.service_name || l.service,
        status: statusStyles[l.status] ? l.status : "Positive",
        amount: Number(l.amount) || 0
      }));
      document.getElementById('serviceFilter').innerHTML = '<option value="">All Services</option>';
      document.getElementById('serviceFilter').dataset.done = "";
      populateServiceFilter();
      renderStats();
      renderAll();
    } else {
      console.error("Failed to fetch leads:", data.message);
    }
  } catch(err) {
    console.error("Error fetching leads:", err);
  }
}

const serviceIcons = {

  "Customized MLM Software Development": `<rect x="3" y="4" width="18" height="14" rx="2"/><path d="M8 22h8M12 18v4"/>`,
  "MLM Plan PDF Making": `<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6M9 15h6M9 11h2"/>`,
  "Latest MLM Database": `<ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v14c0 1.66 3.58 3 8 3s8-1.34 8-3V5M4 12c0 1.66 3.58 3 8 3s8-1.34 8-3"/>`,
  "Result Based Promotion": `<path d="M3 3v18h18"/><path d="M7 15l4-5 3 3 5-7"/>`,
  "MLM Leader Website": `<circle cx="12" cy="8" r="4"/><path d="M4 21c0-4.4 3.6-8 8-8s8 3.6 8 8"/>`,

/* Dark-theme badge palette: translucent fill + colored border + colored text, matching the reference screenshot */
const statusStyles = {
  Positive:   { bg:'bg-blue-500/10',    text:'text-blue-300'    },
  Negative:   { bg:'bg-gray-500/10',    text:'text-gray-300'    },
  Accepted:   { bg:'bg-orange-500/10',  text:'text-orange-300'  },
  Conversion: { bg:'bg-emerald-500/10', text:'text-emerald-300' },
};
const arrowFor = (hex) => {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="${hex}" stroke-width="2.5"><path d="M6 9l6 6 6-6"/></svg>`;
  return `url("data:image/svg+xml,${encodeURIComponent(svg)}")`;
};
const arrowColor = { Positive:'#93c5fd', Negative:'#d1d5db', Accepted:'#fdba74', Conversion:'#6ee7b7' };

let activeSearch = "";
let activeService = "";
let activeStatus = "";

/* ============ ICONS ============ */

const instaSvg = `<svg viewBox="0 0 448 512" class="w-5 h-5 fill-current"><path d="M224.1 141c-63.6 0-114.9 51.3-114.9 114.9s51.3 114.9 114.9 114.9S339 319.5 339 255.9 275.7 141 224.1 141zm0 189.6c-41.1 0-74.7-33.5-74.7-74.7s33.5-74.7 74.7-74.7 74.7 33.5 74.7 74.7-33.6 74.7-74.7 74.7zm146.4-194.3c0 14.9-12 26.8-26.8 26.8-14.9 0-26.8-12-26.8-26.8s12-26.8 26.8-26.8 26.8 12 26.8 26.8zm76.1 27.2c-1.7-35.9-9.9-67.7-36.2-93.9-26.2-26.2-58-34.4-93.9-36.2-37-2.1-147.9-2.1-184.9 0-35.8 1.7-67.6 9.9-93.9 36.1s-34.4 58-36.2 93.9c-2.1 37-2.1 147.9 0 184.9 1.7 35.9 9.9 67.7 36.2 93.9s58 34.4 93.9 36.2c37 2.1 147.9 2.1 184.9 0 35.9-1.7 67.7-9.9 93.9-36.2 26.2-26.2 34.4-58 36.2-93.9 2.1-37 2.1-147.8 0-184.8zM398.8 388c-7.8 19.6-22.9 34.7-42.6 42.6-29.5 11.7-99.5 9-132.1 9s-102.7 2.6-132.1-9c-19.6-7.8-34.7-22.9-42.6-42.6-11.7-29.5-9-99.5-9-132.1s-2.6-102.7 9-132.1c7.8-19.6 22.9-34.7 42.6-42.6 29.5-11.7 99.5-9 132.1-9s102.7-2.6 132.1 9c19.6 7.8 34.7 22.9 42.6 42.6 11.7 29.5 9 99.5 9 132.1s2.7 102.7-9 132.1z"/></svg>`;

function toast(msg){
  const t = document.getElementById('toast');
  document.getElementById('toastText').textContent = msg;
  t.style.transform = 'translate(-50%,0)';
  t.style.opacity = '1';
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>{ t.style.transform='translate(-50%,5rem)'; t.style.opacity='0'; }, 1600);
}

function actionIcons(l, size){
  const dim = size || 'w-10 h-10';
  const delSvg = `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>`;
  return `
    <a href="https://wa.me/91${l.mobile}" target="_blank" rel="noopener" title="WhatsApp"
       class="${dim} rounded-full bg-green-500/10 text-green-400 flex items-center justify-center hover:bg-green-500 hover:text-white transition-colors">${waSvg}</a>
    <a href="https://t.me/+91${l.mobile}" target="_blank" rel="noopener" title="Telegram"
       class="${dim} rounded-full bg-sky-500/10 text-sky-400 flex items-center justify-center hover:bg-sky-500 hover:text-white transition-colors">${tgSvg}</a>
    <a href="https://instagram.com" target="_blank" rel="noopener" title="Instagram"
       class="${dim} rounded-full bg-pink-500/10 text-pink-400 flex items-center justify-center hover:bg-pink-500 hover:text-white transition-colors">${instaSvg}</a>
    <a href="tel:+91${l.mobile}" title="Call"
       class="${dim} rounded-full bg-orange-500/10 text-orange-400 flex items-center justify-center hover:bg-orange-500 hover:text-white transition-colors">${callSvg}</a>
    <button data-delete-idx="${l.sl-1}" title="Delete Lead"
       class="${dim} rounded-full bg-red-500/10 text-red-400 flex items-center justify-center hover:bg-red-500 hover:text-white transition-colors">${delSvg}</button>
  `;

/* ============ STAT CARDS ============ */
let activeCardFilter = ''; // '', 'Positive', 'Accepted', 'Conversion', 'Revenue'

function renderStats(){
  const total = leads.length;
  const positive = leads.filter(l=>l.status==='Positive').length;
  const accepted = leads.filter(l=>l.status==='Accepted').length;
  const conversion = leads.filter(l=>l.status==='Conversion').length;
  const negative = leads.filter(l=>l.status==='Negative').length;

  const stats = [
    { key:'total',      label:'TOTAL LEADS',  value: total,      icon:`<path d="M4 4h16v4H4zM4 12h16M4 16h16M4 20h10"/>`,        gradient:'from-blue-600 to-indigo-700',    ringColor:'ring-white/70' },
    { key:'Positive',   label:'POSITIVE',     value: positive,   icon:`<path d="M7 14l3-3 3 3 5-6"/>`,                          gradient:'from-orange-500 to-amber-600',   ringColor:'ring-white/70' },
    { key:'Accepted',   label:'ACCEPTED',     value: accepted,   icon:`<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>`, gradient:'from-teal-500 to-emerald-600',   ringColor:'ring-white/70' },
    { key:'Conversion', label:'CONVERSION',   value: conversion, icon:`<path d="M5 13l4 4L19 7"/>`,                              gradient:'from-purple-600 to-fuchsia-600', ringColor:'ring-white/70' },
    { key:'Negative',   label:'NEGATIVE',     value: negative,   icon:`<circle cx="12" cy="12" r="9"/><path d="M15 9l-6 6M9 9l6 6"/>`, gradient:'from-rose-600 to-red-700',  ringColor:'ring-white/70' },
  ];

  document.getElementById('statCards').innerHTML = stats.map(s => {
    const isActive = activeCardFilter === s.key;
    const activeCls  = isActive ? `ring-2 ${s.ringColor} ring-offset-2 ring-offset-[#0A0E17] scale-[1.02] shadow-lg` : '';
    const clickHint  = isActive ? 'opacity-100' : 'opacity-0 group-hover:opacity-80';
    return `
    <div data-card-key="${s.key}" class="stat-card group bg-gradient-to-br ${s.gradient} rounded-2xl shadow-card p-5 text-white ${activeCls} relative select-none">
      <div class="flex items-center justify-between mb-3">
        <span class="text-sm font-bold tracking-wide text-white/90 uppercase">${s.label}</span>
        <div class="w-9 h-9 rounded-lg bg-white/15 text-white flex items-center justify-center shrink-0">
          <svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${s.icon}</svg>
        </div>
      </div>
      <div class="font-body font-bold text-3xl text-white">${s.value}</div>
      <div class="mt-2 text-[10px] font-semibold text-white/80 ${clickHint} transition-opacity flex items-center gap-1">
        <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg>
        ${isActive ? 'Click to clear' : 'Click to filter'}
      </div>
    </div>
  `;
  }).join('');
}

function populateServiceFilter(){
  const services = [...new Set(leads.map(l=>l.service))];
  const sel = document.getElementById('serviceFilter');
  if(sel.dataset.done) return;
  services.forEach(s=>{
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sel.appendChild(opt);
  });
  sel.dataset.done = "1";
}

function getFiltered(){
  return leads
    .map((l,i)=>({...l, sl:i+1}))
    .filter(l=>{
      const q = activeSearch.toLowerCase();
      const matchesSearch = !q || l.name.toLowerCase().includes(q) || l.mobile.includes(q) || l.email.toLowerCase().includes(q);
      const matchesService = !activeService || l.service === activeService;
      const matchesStatus = !activeStatus || l.status === activeStatus;
      return matchesSearch && matchesService && matchesStatus;
    });
}

function statusSelect(l, idx){
  const s = statusStyles[l.status] || statusStyles['Positive'];
  const arrow = arrowFor(arrowColor[l.status] || arrowColor['Positive']);
  return `
    <select data-status-idx="${idx}" style='background-image:${arrow}' class="status-select ${s.bg} ${s.text} text-sm font-bold rounded-full pl-3.5 pr-8 py-2 border border-current focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-offset-[#0D1220] cursor-pointer">
      <option class="bg-[#0D1220] text-white" value="Positive" ${l.status==='Positive'?'selected':''}>Positive</option>
      <option class="bg-[#0D1220] text-white" value="Negative" ${l.status==='Negative'?'selected':''}>Negative</option>
      <option class="bg-[#0D1220] text-white" value="Accepted" ${l.status==='Accepted'?'selected':''}>Accepted</option>
      <option class="bg-[#0D1220] text-white" value="Conversion" ${l.status==='Conversion'?'selected':''}>Conversion</option>
    </select>
  `;
}

function amountBlock(l, idx){
  return `
    <div class="flex items-center gap-1.5">
      <span class="text-gray-500 text-xs font-mono">₹</span>
      <input type="number" min="0" data-amount-idx="${idx}" value="${l.amount || ''}" placeholder="0"
             class="amount-input w-20 bg-[#0A0E17] border border-white/10 rounded-lg px-2 py-1.5 text-[13px] font-mono text-gray-100 focus:outline-none focus:ring-2 focus:ring-purple-500/40 focus:border-purple-400/40">
      <button data-tick-idx="${idx}" title="Save amount"
              class="amt-tick w-7 h-7 rounded-lg bg-emerald-500/10 text-emerald-400 hover:bg-emerald-500 hover:text-white flex items-center justify-center transition-colors shrink-0">
        <svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M5 13l4 4L19 7"/></svg>
      </button>
    </div>
  `;
}

/* ============ RENDER TABLE ============ */
function renderTable(){
  const rows = getFiltered();
  document.getElementById('resultsBadge').textContent = `${rows.length} results`;
  const body = document.getElementById('tableBody');
  document.getElementById('emptyStateDesktop').classList.toggle('hidden', rows.length !== 0);

  const avatarGradients = ['from-blue-500 to-indigo-600','from-orange-500 to-amber-600','from-purple-500 to-fuchsia-600','from-teal-500 to-emerald-600','from-pink-500 to-rose-600'];

  body.innerHTML = rows.map(l => `
    <tr class="row-fade hover:bg-white/[0.03] transition-colors">
      <td class="px-5 py-4 text-cyan-400 font-mono text-sm font-bold align-middle">${String(l.sl).padStart(2,'0')}</td>
      <td class="px-5 py-4 align-middle">
        <div class="flex items-center gap-2.5">
          <div class="w-9 h-9 rounded-full bg-gradient-to-br ${avatarGradients[l.sl % avatarGradients.length]} text-white flex items-center justify-center font-display font-bold text-xs shrink-0">${l.name.split(' ').map(w=>w[0]).slice(0,2).join('')}</div>
          <span class="font-semibold text-white text-base">${l.name}</span>
        </div>
      </td>
      <td class="px-5 py-4 align-middle font-mono text-sm font-semibold text-cyan-300">${l.mobile}</td>
      <td class="px-5 py-4 align-middle text-sm text-gray-300 truncate max-w-[190px]" title="${l.email}">${l.email}</td>
      <td class="px-5 py-4 align-middle">
        <div class="flex items-center gap-2">
          <svg class="w-4 h-4 text-amber-400 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${serviceIcons[l.service] || ''}</svg>
          <span class="text-sm text-amber-200 font-medium">${l.service}</span>
        </div>
      </td>
      <td class="px-5 py-4 align-middle">${statusSelect(l, l.sl-1)}</td>
      <td class="px-5 py-4 align-middle">${amountBlock(l, l.sl-1)}</td>
      <td class="px-5 py-4 align-middle">
        <div class="flex items-center justify-center gap-1.5">${actionIcons(l, 'w-10 h-10')}</div>
      </td>
    </tr>
  `).join('');
}

/* ============ RENDER CARDS (mobile/tablet) ============ */
function renderCards(){
  const rows = getFiltered();
  const list = document.getElementById('cardList');
  document.getElementById('emptyStateMobile').classList.toggle('hidden', rows.length !== 0);

  list.innerHTML = rows.map(l => `
    <div class="row-fade bg-[#0A0E17] border border-white/10 rounded-2xl p-4">
      <div class="flex items-start justify-between gap-3 mb-3">
        <div class="flex items-center gap-2">
          <div>
            <div class="font-semibold text-white text-sm leading-tight">${l.name}</div>
            <div class="text-[11px] text-gray-500 font-mono mt-0.5">Sl. ${String(l.sl).padStart(2,'0')} · ${l.mobile}</div>
          </div>
        </div>
        ${statusSelect(l, l.sl-1)}
      </div>

      <div class="space-y-2 mb-3.5">
        <div class="flex items-center gap-2 px-1">
          <svg class="w-4 h-4 text-gray-500 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
          <span class="text-[13px] text-gray-300 truncate">${l.email}</span>
        </div>
        <div class="flex items-center gap-2 px-1">
          <svg class="w-4 h-4 text-amber-400 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${serviceIcons[l.service] || ''}</svg>
          <span class="text-[13px] text-amber-200">${l.service}</span>
        </div>
        <div class="flex items-center gap-2 px-1 pt-1">
          <span class="text-[11px] font-semibold text-gray-500 uppercase tracking-wide">Amount</span>
          ${amountBlock(l, l.sl-1)}
        </div>
      </div>

      <div class="flex items-center gap-1.5 pt-3 border-t border-white/5 mt-1">${actionIcons(l, 'w-10 h-10')}</div>
    </div>
  `).join('');
}

function renderAll(){ renderTable(); renderCards(); }

/* ============ STAT CARD CLICK FILTER ============ */
document.getElementById('statCards').addEventListener('click', (e) => {
  const card = e.target.closest('[data-card-key]');
  if (!card) return;
  const key = card.dataset.cardKey;

  if (key === 'total') {
    if (activeCardFilter === 'total') return; // already selected
    activeCardFilter = 'total';
    activeStatus = '';
    document.getElementById('statusFilterTop').value = '';
    hidePill();
  } else {
    if (activeCardFilter === key) return; // Do nothing if already selected
    activeCardFilter = key;
    activeStatus = key; // Negative, Positive, Accepted, Conversion all map directly
    document.getElementById('statusFilterTop').value = key;
    showPill(key + ' leads');
  }

  renderStats();
  renderAll();
});

function showPill(label) {
  const pill = document.getElementById('activeFilterPill');
  document.getElementById('activeFilterLabel').textContent = 'Showing: ' + label;
  pill.classList.remove('hidden');
}
function hidePill() {
  document.getElementById('activeFilterPill').classList.add('hidden');
}
document.getElementById('clearFilterBtn').addEventListener('click', () => {
  activeCardFilter = '';
  activeStatus = '';
  document.getElementById('statusFilterTop').value = '';
  hidePill();
  renderStats();
  renderAll();
});

/* ============ EVENTS ============ */
document.addEventListener('change', (e)=>{
  const sel = e.target.closest('[data-status-idx]');
  if(sel){
    const idx = Number(sel.dataset.statusIdx);
    const ld = leads[idx];
    const newStatus = sel.value;
    const token = sessionStorage.getItem('adminToken');
    
    sel.disabled = true;
    fetch(`${CONFIG.API_BASE_URL}/leads/status/${ld.id}`, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ status: newStatus })
    })
    .then(res => res.json())
    .then(data => {
      sel.disabled = false;
      if (data.success) {
        ld.status = newStatus;
        toast(`${ld.name.split(' ')[0]}'s status set to ${newStatus}`);
        renderStats();
        renderAll();
      } else {
        toast('Failed to update status');
        sel.value = ld.status;
      }
    })
    .catch(err => {
      sel.disabled = false;
      sel.value = ld.status;
      console.error(err);
      toast('Error updating status');
    });
  }
});

document.addEventListener('click', (e)=>{
  const delBtn = e.target.closest('[data-delete-idx]');
  if (delBtn) {
    const idx = Number(delBtn.dataset.deleteIdx);
    const ld = leads[idx];
    
    Swal.fire({
      title: 'Are you sure?',
      text: `Do you want to ${currentView === 'active' ? 'move this lead to archive' : 'permanently delete this lead'}?`,
      icon: 'warning',
      showCancelButton: true,
      confirmButtonColor: '#8B5CF6',
      cancelButtonColor: '#d33',
      confirmButtonText: 'Yes, proceed!'
    }).then((result) => {
      if (result.isConfirmed) {
        const token = sessionStorage.getItem('adminToken');
        delBtn.disabled = true;
        
        const deleteEndpoint = currentView === 'archived' ? `/leads/archive/delete/${ld.id}` : `/leads/delete/${ld.id}`;
        
        fetch(`${CONFIG.API_BASE_URL}${deleteEndpoint}`, {
          method: 'DELETE',
          headers: { 'Authorization': `Bearer ${token}` }
        })
        .then(res => res.json().catch(() => ({}))) // Fallback if not JSON
        .then(data => {
          if (data.success || data.message === "Lead deleted" || data.message === "Lead deleted successfully" || !data.error) {
            Swal.fire({
              title: currentView === 'active' ? 'Moved to Archive!' : 'Deleted!',
              text: currentView === 'active' ? 'The lead has been moved to the archive.' : 'The lead has been permanently deleted.',
              icon: 'success',
              confirmButtonColor: '#8B5CF6'
            });
            fetchLeads(); // refresh the list
          } else {
            Swal.fire('Error', data.message || 'Failed to process lead', 'error');
            delBtn.disabled = false;
          }
        })
        .catch(err => {
          console.error(err);
          Swal.fire('Error', 'An error occurred during the request', 'error');
          delBtn.disabled = false;
        });
      }
    });
    return;
  }

  const tick = e.target.closest('[data-tick-idx]');
  if(tick){
    const idx = Number(tick.dataset.tickIdx);
    const ld = leads[idx];
    const input = document.querySelector(`.amount-input[data-amount-idx="${idx}"]`);
    const val = Number(input.value) || 0;
    const token = sessionStorage.getItem('adminToken');
    
    tick.disabled = true;
    fetch(`${CONFIG.API_BASE_URL}/leads/amount/${ld.id}`, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ amount: val })
    })
    .then(res => res.json())
    .then(data => {
      tick.disabled = false;
      if (data.success) {
        ld.amount = val;
        tick.classList.remove('saved'); void tick.offsetWidth; tick.classList.add('saved');
        toast(`Amount ₹${val.toLocaleString('en-IN')} saved for ${ld.name.split(' ')[0]}`);
        renderStats();
      } else {
        toast('Failed to update amount');
      }
    })
    .catch(err => {
      tick.disabled = false;
      console.error(err);
      toast('Error updating amount');
    });
  }
});

document.getElementById('searchInput').addEventListener('input', (e)=>{ activeSearch = e.target.value; renderAll(); });
document.getElementById('serviceFilter').addEventListener('change', (e)=>{ activeService = e.target.value; renderAll(); });
document.getElementById('statusFilterTop').addEventListener('change', (e)=>{ 
  activeStatus = e.target.value; 
  // sync card highlight with dropdown
  activeCardFilter = activeStatus || '';
  if (!activeStatus) hidePill();
  else showPill(activeStatus + ' leads');
  renderStats();
  renderAll(); 
});

/* ============ INIT ============ */
fetchLeads();
</script>
</body>
</html>
